<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>C-Track</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/B5DqV2rW/ctrack250.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');
        
        :root { --ios-green: #28cd41; }
        body { font-family: 'SF Pro Display', -apple-system, sans-serif; background: #f2f2f7; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        .ios-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; }
        .ios-blur { background: rgba(255, 255, 255, 0.7); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); }
        .safe-t { padding-top: env(safe-area-inset-top); }
        .safe-b { padding-bottom: env(safe-area-inset-bottom); }
        
        [x-cloak] { display: none !important; }
        
        .splash {
            position: fixed; inset: 0; z-index: 999; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <div id="splash" class="splash">
        <img src="https://i.ibb.co/B5DqV2rW/ctrack250.jpg" class="w-32 h-32 rounded-[30px] shadow-xl mb-6">
        <div class="w-12 h-1 bg-gray-100 rounded-full overflow-hidden">
            <div class="h-full bg-green-500 animate-[loading_2s_ease-in-out_infinite]"></div>
        </div>
        <style>@keyframes loading { 0% { width: 0; } 100% { width: 100%; } }</style>
    </div>

    <div class="safe-t h-12"></div>

    <div class="px-5 pb-32">
        
        <div x-show="view === 'home'" x-cloak>
            <h1 class="text-3xl font-bold tracking-tight mb-6">Summary</h1>
            
            <div class="ios-card p-8 text-center shadow-sm mb-6 border border-white">
                <div class="relative inline-flex items-center justify-center">
                    <svg class="w-48 h-48 transform -rotate-90">
                        <circle cx="96" cy="96" r="88" stroke="#e5e7eb" stroke-width="12" fill="none" />
                        <circle cx="96" cy="96" r="88" stroke="var(--ios-green)" stroke-width="12" fill="none"
                            stroke-linecap="round" :style="`stroke-dasharray: 553; stroke-dashoffset: ${553 - (553 * Math.min(totals.cal / goals.cal, 1))}`" />
                    </svg>
                    <div class="absolute flex flex-col">
                        <span class="text-4xl font-bold" x-text="goals.cal - totals.cal"></span>
                        <span class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Remaining</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-8">
                <template x-for="(val, macro) in {P: 'protein', C: 'carbs', F: 'fat'}">
                    <div class="ios-card p-4 border border-white/50 text-center">
                        <div class="text-[10px] font-bold uppercase mb-1" :class="macro === 'P' ? 'text-blue-500' : macro === 'C' ? 'text-orange-500' : 'text-pink-500'" x-text="macro"></div>
                        <div class="font-bold text-lg" x-text="Math.round(totals[val]) + 'g'"></div>
                    </div>
                </template>
            </div>

            <h2 class="text-xl font-bold mb-4">Today's Meals</h2>
            <div class="space-y-3">
                <template x-for="(log, index) in dailyLog" :key="index">
                    <div class="ios-card p-4 flex justify-between items-center animate-in slide-in-from-bottom-2">
                        <div>
                            <p class="font-semibold text-gray-800" x-text="log.name"></p>
                            <p class="text-xs text-gray-400" x-text="`${log.protein}P · ${log.carbs}C · ${log.fat}F`"></p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-green-600" x-text="log.cal"></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="view === 'add'" x-cloak>
            <div class="flex items-center gap-3 mb-6">
                <div class="flex-1 relative">
                    <i data-lucide="search" class="absolute left-4 top-3.5 w-5 h-5 text-gray-400"></i>
                    <input type="text" x-model="search" placeholder="Search Moma's Kitchen..." 
                        class="w-full bg-white rounded-2xl py-3.5 pl-11 pr-4 outline-none shadow-sm focus:ring-2 ring-green-500">
                </div>
                <button @click="toggleScanner()" class="bg-white p-3.5 rounded-2xl shadow-sm text-green-600 active:bg-green-50">
                    <i data-lucide="scan-barcode"></i>
                </button>
            </div>

            <div id="qr-reader" class="rounded-3xl overflow-hidden mb-6" x-show="scanning"></div>

            <div class="space-y-3">
                <div @click="logFood('Default Protein Shake', 830, 34, 83, 49)" class="ios-card p-5 bg-green-500 text-white cursor-pointer active:scale-[0.98] transition">
                    <p class="font-bold">Default Protein Shake</p>
                    <p class="text-xs opacity-80">Almond Butter, Banana, Milk, Protein</p>
                </div>

                <template x-for="food in filteredMoma" :key="food.Meal">
                    <div @click="logFood(food.Meal, food['Est. Calories'], food['Protein (g)'], food['Carbs (g)'], food['Fat (g)'])" 
                        class="ios-card p-4 flex justify-between items-center cursor-pointer active:bg-gray-50 transition">
                        <div>
                            <p class="font-semibold" x-text="food.Meal"></p>
                            <p class="text-xs text-gray-400" x-text="food['Est. Calories'] + ' kcal'"></p>
                        </div>
                        <i data-lucide="plus" class="text-green-500"></i>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="view === 'settings'" x-cloak>
            <h1 class="text-3xl font-bold mb-8">Settings</h1>
            
            <div class="ios-card overflow-hidden mb-6">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                    <span class="font-medium">Nto Preset (High Carb)</span>
                    <button @click="applyNto()" class="text-sm font-bold text-green-600 bg-green-50 px-3 py-1 rounded-full">Apply</button>
                </div>
            </div>

            <div class="ios-card p-4 space-y-4">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider">Targets</h3>
                <template x-for="(val, goal) in goals">
                    <div class="flex justify-between items-center">
                        <span class="capitalize" x-text="goal === 'cal' ? 'Calories' : goal"></span>
                        <input type="number" x-model="goals[goal]" @input="save()" class="w-20 text-right bg-transparent font-bold text-green-600">
                    </div>
                </template>
            </div>
            
            <button @click="clearLog()" class="w-full mt-8 p-4 text-red-500 font-semibold">Clear Today's Data</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 ios-blur safe-b border-t border-gray-200 z-50">
        <div class="flex justify-around items-center h-16">
            <button @click="view = 'home'" :class="view === 'home' ? 'text-green-600' : 'text-gray-400'"><i data-lucide="home"></i></button>
            <button @click="view = 'add'" :class="view === 'add' ? 'text-green-600' : 'text-gray-400'"><i data-lucide="plus-circle"></i></button>
            <button @click="view = 'settings'" :class="view === 'settings' ? 'text-green-600' : 'text-gray-400'"><i data-lucide="settings"></i></button>
        </div>
    </nav>

    <script>
        function app() {
            return {
                view: 'home',
                search: '',
                scanning: false,
                goals: { cal: 2800, protein: 150, carbs: 300, fat: 80 },
                totals: { cal: 0, protein: 0, carbs: 0, fat: 0 },
                dailyLog: [],
                moma: [
                    {"Meal": "Chicken Katsu (3 pcs + 2.5c rice)", "Est. Calories": 1000, "Protein (g)": 58, "Carbs (g)": 128, "Fat (g)": 24},
                    {"Meal": "Mabu Tofu (2.5c + 2c rice)", "Est. Calories": 940, "Protein (g)": 57, "Carbs (g)": 102, "Fat (g)": 40},
                    {"Meal": "Котлетки (4 patties)", "Est. Calories": 840, "Protein (g)": 46, "Carbs (g)": 48, "Fat (g)": 52},
                    {"Meal": "Spaghetti (1/8th of the pot)", "Est. Calories": 810, "Protein (g)": 44, "Carbs (g)": 92, "Fat (g)": 30},
                    {"Meal": "Chicken Teriyaki (2.5 drummie + 2.25c rice)", "Est. Calories": 820, "Protein (g)": 42, "Carbs (g)": 115, "Fat (g)": 22},
                    {"Meal": "White Soup (1.25 bowls)", "Est. Calories": 680, "Protein (g)": 32, "Carbs (g)": 42, "Fat (g)": 46},
                    {"Meal": "Tomato Soup (+ Grilled Cheese)", "Est. Calories": 720, "Protein (g)": 22, "Carbs (g)": 68, "Fat (g)": 42},
                    {"Meal": "Korean Curry (3c curry + 2c rice)", "Est. Calories": 920, "Protein (g)": 42, "Carbs (g)": 135, "Fat (g)": 26},
                    {"Meal": "Peanut Butter and Jelly", "Est. Calories": 380, "Protein (g)": 13, "Carbs (g)": 51, "Fat (g)": 16}
                ],

                init() {
                    const saved = JSON.parse(localStorage.getItem('ctrack_data') || '{}');
                    if (saved.dailyLog) this.dailyLog = saved.dailyLog;
                    if (saved.goals) this.goals = saved.goals;
                    this.calculateTotals();
                    
                    // Hide Splash
                    setTimeout(() => document.getElementById('splash').style.opacity = '0', 2000);
                    setTimeout(() => document.getElementById('splash').style.display = 'none', 2500);
                    
                    lucide.createIcons();
                },

                get filteredMoma() {
                    return this.moma.filter(f => f.Meal.toLowerCase().includes(this.search.toLowerCase()));
                },

                logFood(name, cal, p, c, f) {
                    this.dailyLog.unshift({ name, cal, protein: p, carbs: c, fat: f, ts: Date.now() });
                    this.calculateTotals();
                    this.save();
                    this.view = 'home';
                    this.search = '';
                },

                calculateTotals() {
                    this.totals = this.dailyLog.reduce((acc, curr) => {
                        acc.cal += curr.cal;
                        acc.protein += curr.protein;
                        acc.carbs += curr.carbs;
                        acc.fat += curr.fat;
                        return acc;
                    }, { cal: 0, protein: 0, carbs: 0, fat: 0 });
                },

                applyNto() {
                    this.goals = { cal: 2752, protein: 160, fat: 68, carbs: 375 };
                    this.save();
                    alert("Nto Goals Set!");
                },

                toggleScanner() {
                    if (this.scanning) {
                        this.scanner.stop();
                        this.scanning = false;
                    } else {
                        this.scanning = true;
                        this.scanner = new Html5Qrcode("qr-reader");
                        this.scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                            (code) => this.fetchBarcode(code));
                    }
                },

                async fetchBarcode(code) {
                    this.scanner.stop();
                    this.scanning = false;
                    try {
                        const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json`);
                        const data = await res.json();
                        if (data.status === 1) {
                            const p = data.product;
                            const nut = p.nutriments;
                            this.logFood(p.product_name, Math.round(nut['energy-kcal_100g']), Math.round(nut.proteins_100g), Math.round(nut.carbohydrates_100g), Math.round(nut.fat_100g));
                        } else {
                            alert("Food not found in database.");
                        }
                    } catch (e) { alert("Network error."); }
                },

                save() {
                    localStorage.setItem('ctrack_data', JSON.stringify({ dailyLog: this.dailyLog, goals: this.goals }));
                },

                clearLog() {
                    if (confirm("Clear all entries?")) {
                        this.dailyLog = [];
                        this.calculateTotals();
                        this.save();
                    }
                }
            }
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
